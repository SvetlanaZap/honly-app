<svg width="1160" height="380" viewBox="0 0 1160 380" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'DM Sans', sans-serif">
  <!-- HOnly · clasped hands · teal #3CBEA8 + coral #E8654A on cream #F2EDE6 -->
  <defs>
    <!-- Clasped / interlaced hands mark -->
    <symbol id="clasp" viewBox="0 0 240 215">
      <ellipse cx="120" cy="201" rx="76" ry="9" fill="#1B2532" opacity="0.10"/>
      <!-- forearms -->
      <rect x="2"   y="92" width="116" height="54" rx="27" fill="#3CBEA8"/>
      <rect x="122" y="92" width="116" height="54" rx="27" fill="#E8654A"/>
      <!-- soft shade where hands overlap -->
      <rect x="110" y="92" width="22" height="54" rx="11" fill="#1B2532" opacity="0.07"/>
      <!-- interlaced fingers (alternating = holding hands) -->
      <rect x="91"  y="80" width="13" height="78" rx="6.5" fill="#3CBEA8"/>
      <rect x="104" y="80" width="13" height="78" rx="6.5" fill="#E8654A"/>
      <rect x="117" y="80" width="13" height="78" rx="6.5" fill="#3CBEA8"/>
      <rect x="130" y="80" width="13" height="78" rx="6.5" fill="#E8654A"/>
      <rect x="143" y="80" width="13" height="78" rx="6.5" fill="#3CBEA8"/>
      <!-- knuckle caps = backs of the two hands -->
      <rect x="92"  y="84" width="42" height="16" rx="8" fill="#3CBEA8"/>
      <rect x="118" y="84" width="42" height="16" rx="8" fill="#E8654A"/>
    </symbol>
  </defs>

  <rect width="1160" height="380" fill="#F2EDE6"/>

  <!-- ===== A: primary mark on cream ===== -->
  <g transform="translate(0,0)">
    <rect x="20" y="20" width="320" height="290" rx="18" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <use href="#clasp" x="80" y="60" width="200" height="179"/>
    <text x="180" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">Clasped-hands mark</text>
  </g>

  <!-- ===== B: app icon on navy / dark ===== -->
  <g transform="translate(360,0)">
    <rect x="20" y="20" width="320" height="290" rx="18" fill="#1B2532"/>
    <use href="#clasp" x="80" y="60" width="200" height="179"/>
    <text x="180" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">App icon · dark</text>
  </g>

  <!-- ===== C: wordmark lockup ===== -->
  <g transform="translate(720,0)">
    <rect x="20" y="20" width="420" height="290" rx="18" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <use href="#clasp" x="48" y="105" width="135" height="121"/>
    <text x="195" y="178" font-size="62" font-weight="700" letter-spacing="-1">
      <tspan fill="#3CBEA8">H</tspan><tspan fill="#1B2532">Only</tspan>
    </text>
    <text x="198" y="212" font-size="17" font-weight="500" fill="#1B2532" opacity="0.7">talk &amp; calls · not dates</text>
    <text x="230" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">Wordmark lockup</text>
  </g>
</svg>
