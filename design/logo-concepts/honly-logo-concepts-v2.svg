<svg width="1280" height="460" viewBox="0 0 1280 460" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'DM Sans', sans-serif">
  <!-- HOnly — talk, don't date. Palette: coral #E8654A · teal #3CBEA8 · navy #1B2532 · cream #F2EDE6 -->
  <rect width="1280" height="460" fill="#F2EDE6"/>

  <!-- ============ A: Wordmark, O = speech bubble ============ -->
  <g transform="translate(0,20)">
    <rect x="20" y="10" width="280" height="400" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <text x="38" y="215" font-size="96" font-weight="700" fill="#E8654A" letter-spacing="-2">H</text>
      <!-- speech-bubble O -->
      <g transform="translate(2,0)">
        <rect x="106" y="148" width="60" height="60" rx="20" fill="#3CBEA8" stroke="#1B2532" stroke-width="4"/>
        <path d="M118 205 l-2 22 18 -16 Z" fill="#3CBEA8" stroke="#1B2532" stroke-width="4" stroke-linejoin="round"/>
        <circle cx="124" cy="178" r="5" fill="#F2EDE6"/>
        <circle cx="136" cy="178" r="5" fill="#F2EDE6"/>
        <circle cx="148" cy="178" r="5" fill="#F2EDE6"/>
      </g>
      <text x="176" y="215" font-size="96" font-weight="700" fill="#1B2532" letter-spacing="-2">nly</text>
      <text x="150" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">Bubble-O wordmark</text>
    </g>
  </g>

  <!-- ============ B: H built from two chat bubbles (HERO) ============ -->
  <g transform="translate(320,20)">
    <rect x="20" y="10" width="280" height="400" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <!-- shadow -->
      <g transform="translate(7,7)">
        <rect x="98" y="105" width="46" height="135" rx="16" fill="#1B2532"/>
        <rect x="176" y="105" width="46" height="135" rx="16" fill="#1B2532"/>
        <rect x="136" y="160" width="48" height="22" rx="8" fill="#1B2532"/>
      </g>
      <!-- left bubble -->
      <rect x="98" y="105" width="46" height="135" rx="16" fill="#E8654A" stroke="#1B2532" stroke-width="4"/>
      <path d="M104 232 l-3 24 20 -14 Z" fill="#E8654A" stroke="#1B2532" stroke-width="4" stroke-linejoin="round"/>
      <!-- right bubble -->
      <rect x="176" y="105" width="46" height="135" rx="16" fill="#3CBEA8" stroke="#1B2532" stroke-width="4"/>
      <path d="M216 232 l3 24 -20 -14 Z" fill="#3CBEA8" stroke="#1B2532" stroke-width="4" stroke-linejoin="round"/>
      <!-- crossbar = the message connecting them -->
      <rect x="136" y="160" width="48" height="22" rx="8" fill="#1B2532"/>
      <!-- typing dots inside left bubble -->
      <circle cx="121" cy="135" r="5.5" fill="#F2EDE6"/>
      <circle cx="121" cy="153" r="5.5" fill="#F2EDE6"/>
      <circle cx="121" cy="171" r="5.5" fill="#F2EDE6"/>
      <text x="150" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">Chat-bubble H</text>
    </g>
  </g>

  <!-- ============ C: Bubble + voice wave (text AND calls) ============ -->
  <g transform="translate(640,20)">
    <rect x="20" y="10" width="280" height="400" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <g transform="translate(7,7)">
        <path d="M75 110 h150 a24 24 0 0 1 24 24 v72 a24 24 0 0 1 -24 24 h-92 l-30 28 v-28 h-28 a24 24 0 0 1 -24 -24 v-72 a24 24 0 0 1 24 -24 Z" fill="#1B2532"/>
      </g>
      <path d="M75 110 h150 a24 24 0 0 1 24 24 v72 a24 24 0 0 1 -24 24 h-92 l-30 28 v-28 h-28 a24 24 0 0 1 -24 -24 v-72 a24 24 0 0 1 24 -24 Z" fill="#E8654A" stroke="#1B2532" stroke-width="4"/>
      <!-- voice waveform -->
      <g stroke="#F2EDE6" stroke-width="9" stroke-linecap="round">
        <line x1="92" y1="170" x2="92" y2="170"/>
        <line x1="112" y1="155" x2="112" y2="185"/>
        <line x1="132" y1="140" x2="132" y2="200"/>
        <line x1="152" y1="150" x2="152" y2="190"/>
        <line x1="172" y1="132" x2="172" y2="208"/>
        <line x1="192" y1="155" x2="192" y2="185"/>
        <line x1="212" y1="148" x2="212" y2="192"/>
      </g>
      <text x="150" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">Talk + voice</text>
    </g>
  </g>

  <!-- ============ D: "Humans Only" — verified-human seal ============ -->
  <g transform="translate(960,20)">
    <rect x="20" y="10" width="280" height="400" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <g transform="translate(6,6)"><circle cx="150" cy="160" r="82" fill="#1B2532"/></g>
      <circle cx="150" cy="160" r="82" fill="#3CBEA8" stroke="#1B2532" stroke-width="4"/>
      <circle cx="150" cy="160" r="67" fill="none" stroke="#F2EDE6" stroke-width="2.5" stroke-dasharray="4 6"/>
      <text x="150" y="138" text-anchor="middle" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="1">HUMANS</text>
      <!-- speech bubble with check = real human, no bots, no pressure -->
      <g transform="translate(126,150)">
        <rect x="0" y="0" width="48" height="34" rx="10" fill="#F2EDE6" stroke="#1B2532" stroke-width="3"/>
        <path d="M8 31 l-2 12 12 -9 Z" fill="#F2EDE6" stroke="#1B2532" stroke-width="3" stroke-linejoin="round"/>
        <path d="M14 17 l8 8 14 -16" fill="none" stroke="#E8654A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="150" y="218" text-anchor="middle" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="3">ONLY</text>
      <text x="150" y="350" text-anchor="middle" font-size="19" font-weight="700" fill="#1B2532">Verified-human seal</text>
    </g>
  </g>
</svg>
