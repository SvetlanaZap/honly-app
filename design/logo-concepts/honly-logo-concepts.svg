<svg width="1280" height="420" viewBox="0 0 1280 420" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'DM Sans', sans-serif">
  <!-- Brand palette: coral #E8654A · teal #3CBEA8 · navy #1B2532 · cream #F2EDE6 -->
  <rect width="1280" height="420" fill="#F2EDE6"/>

  <!-- ============ CONCEPT A: H-heart monogram (refined current mark) ============ -->
  <g transform="translate(0,20)">
    <rect x="20" y="10" width="280" height="340" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <!-- offset shadow -->
      <g transform="translate(7,7)">
        <rect x="100" y="110" width="28" height="130" rx="6" fill="#1B2532"/>
        <rect x="172" y="110" width="28" height="130" rx="6" fill="#1B2532"/>
      </g>
      <!-- bars -->
      <rect x="100" y="110" width="28" height="130" rx="6" fill="#E8654A" stroke="#1B2532" stroke-width="4"/>
      <rect x="172" y="110" width="28" height="130" rx="6" fill="#E8654A" stroke="#1B2532" stroke-width="4"/>
      <!-- heart crossbar -->
      <path transform="translate(106,138) scale(1.6)" d="M24 42 C24 42 6 30 6 18 C6 11 11 6 18 6 C21 6 23 8 24 10 C25 8 27 6 30 6 C37 6 42 11 42 18 C42 30 24 42 24 42 Z" fill="#E8654A" stroke="#ffffff" stroke-width="3.5"/>
      <text x="150" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#1B2532">Monogram H♥</text>
    </g>
  </g>

  <!-- ============ CONCEPT B: Wordmark with heart-O ============ -->
  <g transform="translate(320,20)">
    <rect x="20" y="10" width="280" height="340" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <!-- offset shadow on letters -->
      <text x="40" y="205" font-size="96" font-weight="700" fill="#1B2532" letter-spacing="-2">H</text>
      <path transform="translate(101,118) scale(1.15)" d="M24 42 C24 42 6 30 6 18 C6 11 11 6 18 6 C21 6 23 8 24 10 C25 8 27 6 30 6 C37 6 42 11 42 18 C42 30 24 42 24 42 Z" fill="#E8654A" stroke="#1B2532" stroke-width="3.5"/>
      <text x="160" y="205" font-size="96" font-weight="700" fill="#1B2532" letter-spacing="-2">nly</text>
      <text x="150" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#1B2532">Heart-O wordmark</text>
    </g>
  </g>

  <!-- ============ CONCEPT C: Speech bubble + heart (conversation) ============ -->
  <g transform="translate(640,20)">
    <rect x="20" y="10" width="280" height="340" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <!-- shadow -->
      <g transform="translate(7,7)">
        <path d="M95 115 h130 a22 22 0 0 1 22 22 v62 a22 22 0 0 1 -22 22 h-78 l-26 26 v-26 h-26 a22 22 0 0 1 -22 -22 v-62 a22 22 0 0 1 22 -22 Z" fill="#1B2532"/>
      </g>
      <!-- bubble -->
      <path d="M95 115 h130 a22 22 0 0 1 22 22 v62 a22 22 0 0 1 -22 22 h-78 l-26 26 v-26 h-26 a22 22 0 0 1 -22 -22 v-62 a22 22 0 0 1 22 -22 Z" fill="#3CBEA8" stroke="#1B2532" stroke-width="4"/>
      <!-- heart -->
      <path transform="translate(126,128) scale(1.6)" d="M24 42 C24 42 6 30 6 18 C6 11 11 6 18 6 C21 6 23 8 24 10 C25 8 27 6 30 6 C37 6 42 11 42 18 C42 30 24 42 24 42 Z" fill="#F2EDE6" stroke="#1B2532" stroke-width="3"/>
      <text x="150" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#1B2532">Chat + heart</text>
    </g>
  </g>

  <!-- ============ CONCEPT D: "Humans Only" stamp/badge ============ -->
  <g transform="translate(960,20)">
    <rect x="20" y="10" width="280" height="340" rx="16" fill="#ffffff" stroke="#1B2532" stroke-width="3"/>
    <g transform="translate(20,0)">
      <g transform="translate(6,6)"><circle cx="150" cy="165" r="78" fill="#1B2532"/></g>
      <circle cx="150" cy="165" r="78" fill="#E8654A" stroke="#1B2532" stroke-width="4"/>
      <circle cx="150" cy="165" r="64" fill="none" stroke="#F2EDE6" stroke-width="2.5" stroke-dasharray="4 6"/>
      <text x="150" y="150" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="1">HUMANS</text>
      <path transform="translate(138,158) scale(0.55)" d="M24 42 C24 42 6 30 6 18 C6 11 11 6 18 6 C21 6 23 8 24 10 C25 8 27 6 30 6 C37 6 42 11 42 18 C42 30 24 42 24 42 Z" fill="#F2EDE6"/>
      <text x="150" y="208" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="3">ONLY</text>
      <text x="150" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#1B2532">Humans-Only badge</text>
    </g>
  </g>
</svg>
