<svg width="1024" height="768" viewBox="0 0 1024 768" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', 'DM Sans', sans-serif">
  <!-- HOnly · How it works illustration · brand colors -->
  <!-- coral #E8654A · teal #3CBEA8 · navy #1B2532 · cream #F2EDE6 -->

  <!-- background -->
  <rect width="1024" height="768" fill="#F2EDE6"/>

  <!-- heading -->
  <text x="512" y="130" text-anchor="middle" font-size="58" font-weight="700" fill="#1B2532">Empower real conversations</text>

  <!-- ===== Step 1 — Create profile ===== -->
  <g>
    <circle cx="200" cy="360" r="110" fill="#E8654A"/>
    <!-- person silhouette -->
    <circle cx="200" cy="330" r="42" fill="#F2EDE6"/>
    <path d="M134 432 Q134 372 200 372 Q266 372 266 432 Z" fill="#F2EDE6"/>
    <!-- label card -->
    <rect x="80" y="510" width="240" height="130" rx="20" fill="#E8654A"/>
    <text x="200" y="575" text-anchor="middle" font-size="46" font-weight="700" fill="#FFFFFF">1</text>
    <text x="200" y="615" text-anchor="middle" font-size="30" font-weight="600" fill="#FFFFFF">Create profile</text>
  </g>

  <!-- chevron 1 -->
  <path d="M360 350 L392 382 L360 414" fill="none" stroke="#1B2532" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== Step 2 — Discover people ===== -->
  <g>
    <circle cx="512" cy="360" r="110" fill="#3CBEA8"/>
    <circle cx="512" cy="330" r="42" fill="#F2EDE6"/>
    <path d="M446 432 Q446 372 512 372 Q578 372 578 432 Z" fill="#F2EDE6"/>
    <rect x="392" y="510" width="240" height="130" rx="20" fill="#3CBEA8"/>
    <text x="512" y="575" text-anchor="middle" font-size="46" font-weight="700" fill="#FFFFFF">2</text>
    <text x="512" y="615" text-anchor="middle" font-size="30" font-weight="600" fill="#FFFFFF">Discover people</text>
  </g>

  <!-- chevron 2 -->
  <path d="M672 350 L704 382 L672 414" fill="none" stroke="#1B2532" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== Step 3 — Chat ===== -->
  <g>
    <circle cx="824" cy="360" r="110" fill="#1B2532"/>
    <!-- two chat bubbles -->
    <rect x="762" y="312" width="78" height="52" rx="16" fill="#F2EDE6"/>
    <path d="M778 364 L778 384 L800 364 Z" fill="#F2EDE6"/>
    <rect x="800" y="356" width="78" height="52" rx="16" fill="#3CBEA8"/>
    <path d="M862 408 L862 428 L840 408 Z" fill="#3CBEA8"/>
    <rect x="704" y="510" width="240" height="130" rx="20" fill="#1B2532"/>
    <text x="824" y="575" text-anchor="middle" font-size="46" font-weight="700" fill="#FFFFFF">3</text>
    <text x="824" y="615" text-anchor="middle" font-size="30" font-weight="600" fill="#FFFFFF">Chat</text>
  </g>
</svg>
